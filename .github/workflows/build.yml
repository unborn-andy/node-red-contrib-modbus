name: Build and publish
on:
  pull_request:
    types:
      - opened
  push:
    branches:
      - develop
      - development
      - alpha
      - beta
      - master
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    # Chaos + FSM + load suites need room; hang must fail the job, not burn the runner.
    timeout-minutes: 45
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm run test:ci
      - run: npm run build
      - run: tar -czvf distrib-${{ matrix.node }}.tar.gz modbus examples extras package.json docs index.js README.md CHANGELOG.md
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.node }}
          path: distrib-${{ matrix.node }}.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    # OIDC Trusted Publishing — classic NPM_TOKEN was revoked by npm (Dec 2025).
    # REQUIRED once on https://www.npmjs.com/package/node-red-contrib-modbus/access
    # → Trusted Publisher → GitHub Actions:
    #   Organization or user: BiancoRoyal
    #   Repository: node-red-contrib-modbus
    #   Workflow filename: build.yml
    #   Allowed actions: npm publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Trusted Publishing: Node >= 22.14, npm >= 11.5.1
          node-version: 24
      - name: Ensure npm supports OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
          node --version
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL missing — id-token: write did not take effect"
            exit 1
          fi
          echo "OIDC token request URL is present"
      # @openp4nr/modbus-serial is a root package.json remote tarball (public Cloudsmith).
      # npm@latest defaults can set allow-remote=none → EALLOWREMOTE without this.
      - run: npm install --allow-remote=root
      - run: npm run test:ci
      - run: npm run build
      # Never set NODE_AUTH_TOKEN here — empty/legacy tokens bypass OIDC → ENEEDAUTH/E404.
      - name: Publish to npm (OIDC)
        run: |
          unset NODE_AUTH_TOKEN NPM_TOKEN
          npm publish --access public --allow-remote=root
